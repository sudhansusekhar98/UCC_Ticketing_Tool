services:
  backend:
    build: ./backend-express
    container_name: ticketops-backend
    restart: unless-stopped
    env_file:
      - ./backend-express/.env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: ticketops-frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  backend-uploads:
